<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLytics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 260px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9fafb;
            color: #111827;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #5b21b6 0%, #be185d 42%, #ea580c 72%, #15803d 100%);
            padding: 10px 14px 8px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* subtle noise texture overlay */
        .header::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.04);
            pointer-events: none;
        }

        .logo {
            display: flex;
            justify-content: center;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            width: 80px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 1px 4px rgba(0,0,0,0.25));
        }

        .header-sub {
            font-size: 11px;
            opacity: 0.8;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* ── Content ── */
        .content {
            padding: 12px 14px 14px;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 9px;
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        input {
            width: 100%;
            padding: 7px 9px;
            border: 1.5px solid #e5e7eb;
            border-radius: 7px;
            font-size: 12px;
            background: white;
            color: #111827;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        input::placeholder { color: #9ca3af; }

        .input-hint {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
        }

        /* ── Primary button ── */
        .btn-primary {
            width: 100%;
            padding: 8px;
            background: linear-gradient(135deg, #6d28d9, #be185d);
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            margin-top: 4px;
        }

        .btn-primary:hover  { opacity: 0.9; }
        .btn-primary:active { transform: scale(0.98); }

        /* ── Sync buttons ── */
        .section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .sync-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .sync-btn {
            padding: 9px 6px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            border: 1.5px solid;
        }

        .sync-btn .btn-icon {
            display: block;
            margin-bottom: 4px;
        }

        .sync-btn .btn-icon svg {
            width: 18px;
            height: 18px;
        }

        .sync-btn .btn-label {
            display: block;
            font-size: 11px;
        }

        .btn-lc {
            background: #fff7ed;
            color: #c2410c;
            border-color: #fed7aa;
        }
        .btn-lc:hover:not(:disabled) {
            background: #ffedd5;
            border-color: #fb923c;
        }

        .btn-gfg {
            background: #f0fdf4;
            color: #15803d;
            border-color: #bbf7d0;
        }
        .btn-gfg:hover:not(:disabled) {
            background: #dcfce7;
            border-color: #4ade80;
        }

        .sync-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Status ── */
        .status {
            min-height: 28px;
            padding: 6px 10px;
            border-radius: 7px;
            font-size: 11.5px;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s;
        }

        .status.syncing {
            background: #f5f3ff;
            color: #5b21b6;
        }

        .status.success {
            background: #f0fdf4;
            color: #15803d;
        }

        .status.error {
            background: #fef2f2;
            color: #b91c1c;
        }

        /* ── Divider & reset ── */
        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 10px 0 8px;
        }

        .reset-link {
            display: block;
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.15s;
        }

        .reset-link:hover { color: #6b7280; }

        /* ── Spinner ── */
        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner {
            display: inline-block;
            width: 11px;
            height: 11px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: -1px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <!-- Setup screen -->
    <div id="setup">
        <div class="header">
            <div class="logo">
                <img class="logo-icon" src="logo.png" alt="CodeLytics" />
            </div>
            <div class="header-sub">Connect your account to get started</div>
        </div>
        <div class="content">
            <div class="form-group">
                <label>Backend URL</label>
                <input id="backendUrl" type="url" placeholder="https://your-backend.com" />
            </div>
            <div class="form-group">
                <label>Sync Token</label>
                <input id="syncToken" type="password" placeholder="Paste your sync token" />
                <div class="input-hint">Generate from Student Dashboard → Settings</div>
            </div>
            <div class="form-group">
                <label>GFG Handle</label>
                <input id="gfgHandle" placeholder="Your GeeksForGeeks username" />
            </div>
            <button class="btn-primary" id="save-btn">Save &amp; Continue</button>
        </div>
    </div>

    <!-- Main sync screen -->
    <div id="main" style="display:none;">
        <div class="header">
            <div class="logo">
                <img class="logo-icon" src="logo.png" alt="CodeLytics" />
            </div>
            <div class="header-sub">Sync your solved problems</div>
        </div>
        <div class="content">
            <div class="section-title">Choose platform to sync</div>
            <div class="sync-grid">
                <button class="sync-btn btn-lc" id="LCSync">
                    <span class="btn-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M13.483 0a1.374 1.374 0 0 0-.961.438L7.116 6.226l-3.854 4.126a5.266 5.266 0 0 0-1.209 2.104 5.35 5.35 0 0 0-.125.513 5.527 5.527 0 0 0 .062 2.362 5.83 5.83 0 0 0 .349 1.017 5.938 5.938 0 0 0 1.271 1.818l4.277 4.193.039.038c2.248 2.165 5.852 2.133 8.063-.074l2.396-2.392c.54-.54.54-1.414.003-1.955a1.378 1.378 0 0 0-1.951-.003l-2.396 2.392a3.021 3.021 0 0 1-4.205.038l-.02-.019-4.276-4.193c-.652-.64-.972-1.469-.948-2.263a2.68 2.68 0 0 1 .066-.523 2.545 2.545 0 0 1 .619-1.164L9.13 8.114c1.058-1.134 3.204-1.27 4.43-.278l3.501 2.831c.593.48 1.461.387 1.94-.207a1.384 1.384 0 0 0-.207-1.943l-3.5-2.831c-.8-.647-1.766-1.045-2.774-1.202l2.015-2.158A1.384 1.384 0 0 0 13.483 0zm-2.866 12.815a1.38 1.38 0 0 0-1.38 1.382 1.38 1.38 0 0 0 1.38 1.382H20.79a1.38 1.38 0 0 0 1.38-1.382 1.38 1.38 0 0 0-1.38-1.382z"/>
                        </svg>
                    </span>
                    <span class="btn-label">LeetCode</span>
                </button>
                <button class="sync-btn btn-gfg" id="GFGSync">
                    <span class="btn-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21.45 14.315c-.143.28-.334.532-.565.745a3.691 3.691 0 0 1-1.104.695 4.51 4.51 0 0 1-3.116-.016 3.79 3.79 0 0 1-2.135-2.078 3.571 3.571 0 0 1-.13-.353h7.418a4.26 4.26 0 0 1-.368 1.008zm-11.99-.654a3.793 3.793 0 0 1-2.134 2.078 4.51 4.51 0 0 1-3.117.016 3.7 3.7 0 0 1-1.104-.695 2.652 2.652 0 0 1-.564-.745 4.221 4.221 0 0 1-.368-1.006H9.59c-.038.12-.08.238-.13.352zm14.501-1.758a3.849 3.849 0 0 0-.082-.475l-9.634-.008a3.932 3.932 0 0 1 1.143-2.348c.363-.35.79-.625 1.26-.809a3.97 3.97 0 0 1 4.484.957l1.521-1.49a5.7 5.7 0 0 0-1.922-1.357 6.283 6.283 0 0 0-2.544-.49 6.35 6.35 0 0 0-2.405.457 6.007 6.007 0 0 0-1.963 1.276 6.142 6.142 0 0 0-1.325 1.94 5.862 5.862 0 0 0-.466 1.864h-.063a5.857 5.857 0 0 0-.467-1.865 6.13 6.13 0 0 0-1.325-1.939A6 6 0 0 0 8.21 6.34a6.698 6.698 0 0 0-4.949.031A5.708 5.708 0 0 0 1.34 7.73l1.52 1.49a4.166 4.166 0 0 1 4.484-.958c.47.184.898.46 1.26.81.368.36.66.792.859 1.268.146.344.242.708.285 1.08l-9.635.008A4.714 4.714 0 0 0 0 12.457a6.493 6.493 0 0 0 .345 2.127 4.927 4.927 0 0 0 1.08 1.783c.528.56 1.17 1 1.88 1.293a6.454 6.454 0 0 0 2.504.457c.824.005 1.64-.15 2.404-.457a5.986 5.986 0 0 0 1.964-1.277 6.116 6.116 0 0 0 1.686-3.076h.273a6.13 6.13 0 0 0 1.686 3.077 5.99 5.99 0 0 0 1.964 1.276 6.345 6.345 0 0 0 2.405.457 6.45 6.45 0 0 0 2.502-.457 5.42 5.42 0 0 0 1.882-1.293 4.928 4.928 0 0 0 1.08-1.783A6.52 6.52 0 0 0 24 12.457a4.757 4.757 0 0 0-.039-.554z"/>
                        </svg>
                    </span>
                    <span class="btn-label">GeeksForGeeks</span>
                </button>
            </div>
            <div id="status" class="status"></div>
            <div class="divider"></div>
            <a class="reset-link" id="reset">Reset settings</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
